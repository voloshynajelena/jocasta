<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Jocasta</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { overflow: hidden; background-color: #1a1a2e; }
    #root { display: flex; height: 100%; }
  </style>
  <!-- Polyfill for import.meta -->
  <script>
    if (typeof importMeta === 'undefined') {
      window.importMeta = { url: window.location.href };
    }
    // Polyfill import.meta for non-module scripts
    Object.defineProperty(window, '__import_meta__', {
      get: function() { return { url: window.location.href }; }
    });
  </script>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
