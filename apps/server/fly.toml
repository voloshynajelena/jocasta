# Fly.io configuration for Jocasta Server
# Deploy with: flyctl launch --config apps/server/fly.toml

app = "jocasta-api"
primary_region = "yyz"  # Toronto (closest to Calgary)

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    port = 3001
    timeout = "5s"
    type = "http"
