version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jocasta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jocasta
      POSTGRES_PASSWORD: jocasta_dev_password
      POSTGRES_DB: jocasta
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jocasta']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (optional - for future BullMQ upgrade)
  # redis:
  #   image: redis:7-alpine
  #   container_name: jocasta-redis
  #   restart: unless-stopped
  #   ports:
  #     - '6379:6379'
  #   volumes:
  #     - redis_data:/data

volumes:
  postgres_data:
  # redis_data:
