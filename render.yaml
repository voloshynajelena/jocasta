# Render Blueprint - Infrastructure as Code
# Deploy: Connect GitHub repo to Render, it auto-detects this file

services:
  # NestJS API Server
  - type: web
    name: jocasta-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      npm install -g pnpm turbo &&
      pnpm install --frozen-lockfile --prod=false &&
      cd apps/server && npx prisma generate &&
      cd ../.. && pnpm build --filter=@jocasta/server
    startCommand: cd apps/server && npx prisma migrate deploy && node dist/src/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jocasta-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DEFAULT_TIMEZONE
        value: America/Edmonton
      - key: LOG_LEVEL
        value: info
      # Add these manually in Render dashboard:
      # - GOOGLE_CLIENT_ID
      # - GOOGLE_CLIENT_SECRET
      # - GOOGLE_MAPS_API_KEY
      # - OPENAI_API_KEY
      # - TELEGRAM_BOT_TOKEN

  # Expo Web Client
  - type: web
    name: jocasta-app
    runtime: static
    buildCommand: |
      npm install -g pnpm &&
      cd apps/client &&
      pnpm install --frozen-lockfile &&
      EXPO_PUBLIC_API_URL=https://jocasta-api.onrender.com npx expo export --platform web
    staticPublishPath: apps/client/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: jocasta-db
    plan: free
    region: oregon
    databaseName: jocasta
    user: jocasta
